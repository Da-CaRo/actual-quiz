<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Questions | Actual Quiz</title>
    <script src="https://cdn.jsdelivr.net/gh/Da-CaRo/site-configs@main/control.js" data-web="actual-quiz"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Colores del tablero */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: all 0.2s;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #444 !important;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .geo {
            background-color: #3498db;
        }

        .art {
            background-color: #9b59b6;
        }

        .his {
            background-color: #f1c40f;
            color: #333;
        }

        .ent {
            background-color: #e74c3c;
        }

        .cie {
            background-color: #2ecc71;
        }

        .dep {
            background-color: #e67e22;
        }

        .card {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
        }

        .stats {
            font-size: 0.8rem;
            color: #bdc3c7;
            margin-top: 10px;
        }

        #answer-area {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #444;
            display: none;
        }

        .btn-action {
            background: #95a5a6;
            margin-top: 15px;
            font-size: 0.8rem;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="button-container">
        <button id="btn-geo" class="btn geo" onclick="getQuestion('geo')">GEOGRAFÍA</button>
        <button id="btn-art" class="btn art" onclick="getQuestion('art')">ARTE</button>
        <button id="btn-his" class="btn his" onclick="getQuestion('his')">HISTORIA</button>
        <button id="btn-ent" class="btn ent" onclick="getQuestion('ent')">ENTRETENIMIENTO</button>
        <button id="btn-cie" class="btn cie" onclick="getQuestion('cie')">CIENCIA</button>
        <button id="btn-dep" class="btn dep" onclick="getQuestion('dep')">DEPORTES</button>
    </div>

    <div id="question-card" class="card">
        <h3 id="cat-title">Categoría</h3>
        <p id="question-text">...</p>
        <div class="stats" id="cat-stats">Quedan: --</div>

        <button class="btn-action" onclick="toggleAnswer()">VER RESPUESTA</button>

        <div id="answer-area">
            <strong id="answer-text">...</strong>
        </div>
    </div>

    <script type="module">
        // 1. BASE DE DATOS ESCALABLE (Cada pregunta con su ID único)
        import { db } from './data/questions.js';

        const STORAGE_USED_QUESTIONS = 'trivial_used_questions';



        // 2. LÓGICA DE FILTRADO
        // Usamos un Set para que la búsqueda sea instantánea
        // Inicializamos cargando lo que hubiera en LocalStorage
        let preguntasMostradas = loadUsedQuestions();

        function getQuestion(cat) {
            const todasLasPreguntas = db[cat];
            let disponibles = todasLasPreguntas.filter(p => !preguntasMostradas.has(p.id));

            if (disponibles.length === 0) {
                // Reinicio lógico
                todasLasPreguntas.forEach(p => preguntasMostradas.delete(p.id));
                disponibles = todasLasPreguntas;
                saveUsedQuestions(preguntasMostradas); // Guardamos el estado limpio
            }

            const randomIdx = Math.floor(Math.random() * disponibles.length);
            const seleccionada = disponibles[randomIdx];

            preguntasMostradas.add(seleccionada.id);

            // GUARDAR EN LOCALSTORAGE
            saveUsedQuestions(preguntasMostradas);

            actualizarInterfaz(cat, seleccionada, disponibles.length);
        }

        // Función auxiliar para mantener el código limpio
        function actualizarInterfaz(cat, seleccionada, totalDisponibles) {
            document.getElementById('question-card').style.display = 'block';
            document.getElementById('cat-title').innerText = cat.toUpperCase() + " " + seleccionada.id;
            document.getElementById('cat-title').className = "cat-title " + cat;

            document.getElementById('question-text').innerText = seleccionada.q;
            document.getElementById('answer-text').innerText = seleccionada.a;
            document.getElementById('cat-stats').innerText = `Quedan en el mazo: ${totalDisponibles - 1}`;

            document.getElementById('answer-area').style.display = 'none';
        }

        function toggleAnswer() {
            const area = document.getElementById('answer-area');
            area.style.display = (area.style.display === 'none' || area.style.display === '') ? 'block' : 'none';
        }

        // Guardar las preguntas usadas cada vez que una sale
        function saveUsedQuestions(set) {
            localStorage.setItem(STORAGE_USED_QUESTIONS, JSON.stringify(Array.from(set)));
        }

        // Cargar las preguntas usadas al iniciar
        function loadUsedQuestions() {
            const saved = localStorage.getItem(STORAGE_USED_QUESTIONS);
            return saved ? new Set(JSON.parse(saved)) : new Set();
        }

        function resetGame() {
            if (confirm("¿Estás seguro de que quieres borrar todo el progreso (fichas, quesitos y preguntas)?")) {
                // Borramos todo
                localStorage.removeItem(STORAGE_TOKENS);
                localStorage.removeItem(STORAGE_WEDGES);
                localStorage.removeItem(STORAGE_USED_QUESTIONS);
                location.reload();
            }
        }

        window.getQuestion = getQuestion;
        window.toggleAnswer = toggleAnswer;
    </script>
</body>

</html>
