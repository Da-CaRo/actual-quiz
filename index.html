<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablero</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .board-container {
            width: 90vmin;
            max-width: 700px;
        }
        svg { width: 100%; height: auto; }
        
        /* Diccionario de Colores */
        .geo { fill: #3498db; } /* Azul */
        .art { fill: #9b59b6; } /* Morado */
        .his { fill: #f1c40f; } /* Amarillo */
        .ent { fill: #e74c3c; } /* Rojo */
        .cie { fill: #2ecc71; } /* Verde */
        .dep { fill: #e67e22; } /* Naranja */
        .extra { fill: #fdfdfd; } /* Blanco */

        .slot { stroke: #1a1a1a; stroke-width: 0.4; cursor: pointer; transition: filter 0.2s; }
        .slot:hover { filter: brightness(1.2); }
        .center-hex { fill: #ecf0f1; stroke: #333; stroke-width: 0.8; }

        /* --- ESTILOS DEL DADO --- */
        .dice-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            perspective: 400px;
        }
        #dice {
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 -4px 8px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            user-select: none;
        }
        .dice-rolling {
            animation: roll 0.1s infinite;
        }
        @keyframes roll {
            0% { transform: rotate(0deg) scale(0.95); }
            50% { transform: rotate(5deg) scale(1); }
            100% { transform: rotate(-5deg) scale(0.95); }
        }
        .dice-label {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="board-container">
    <svg viewBox="0 0 100 100" id="gameBoard">
        <circle cx="50" cy="50" r="50" fill="#2c3e50" />
        <g id="ring"></g>
        <g id="spokes"></g>
        <polygon id="hexCenter" class="center-hex" />
        <text x="50" y="52" id="centerText" style="fill:#333; font-size:4px; font-weight:bold; text-anchor:middle;">*</text>
    </svg>
</div>

<div class="dice-container" onclick="rollDice()">
    <div class="dice-label">TAP</div>
    <div id="dice">?</div>
</div>

<script>
    // =========================================================================
    // 1. CONFIGURACIÓN DEL ANILLO (Sentido horario)
    // [QUESITO, casilla 1, 2, 3, 4, 5, 6]
    // =========================================================================
    const anilloManual = [
        ['his', 'art', 'extra', 'cie', 'dep', 'extra', 'geo'], // Anillo Norte
        ['ent', 'geo', 'extra', 'art', 'his', 'extra', 'dep'], // Anillo NE
        ['cie', 'dep', 'extra', 'geo', 'ent', 'extra', 'his'], // Anillo SE
        ['art', 'his', 'extra', 'dep', 'cie', 'extra', 'ent'], // Anillo Sur
        ['geo', 'ent', 'extra', 'his', 'art', 'extra', 'cie'], // Anillo SO
        ['dep', 'cie', 'extra', 'ent', 'geo', 'extra', 'art']  // Anillo NO
    ];

    // =========================================================================
    // 2. CONFIGURACIÓN DE LOS RADIOS (Desde el borde hacia el centro)
    // Cada lista son las 5 casillas de ese brazo.
    // =========================================================================
    const configuracionRadiosManual = [
        ['art', 'geo', 'cie', 'ent', 'dep'], // Radio Norte
        ['geo', 'dep', 'art', 'cie', 'his'], // Radio NE
        ['dep', 'his', 'geo', 'art', 'ent'], // Radio SE
        ['his', 'ent', 'dep', 'geo', 'cie'], // Radio Sur
        ['ent', 'cie', 'his', 'dep', 'art'], // Radio SO
        ['cie', 'art', 'ent', 'his', 'geo']  // Radio NO
    ];

    // =========================================================================
    // 3. PARÁMETROS FÍSICOS
    // =========================================================================
    // --- LÓGICA DEL DADO ---
    let isRolling = false;
    function rollDice() {
        if (isRolling) return;
        isRolling = true;
        const diceEl = document.getElementById('dice');
        const centerText = document.getElementById('centerText');
        
        diceEl.classList.add('dice-rolling');
        
        // Simular tiempo de giro
        setTimeout(() => {
            const result = Math.floor(Math.random() * 6) + 1;
            diceEl.innerText = result;
            diceEl.classList.remove('dice-rolling');
            
            // Opcional: Mostrar el resultado también en el centro del tablero
            centerText.innerText = result;
            centerText.style.fontSize = "6px";
            
            isRolling = false;
        }, 600);
    }

    // --- DIBUJO DEL TABLERO (Mantenido de versiones anteriores) ---
    const rOut = 49, rIn = 40, hexSize = 8, radioWidth = 8;
    const ringGroup = document.getElementById('ring');
    const spokesGroup = document.getElementById('spokes');

    const radioAngularWidth = (radioWidth / (2 * Math.PI * rIn)) * 360;
    const interSlotAngularWidth = (60 - radioAngularWidth) / 6;

    // --- DIBUJAR ANILLO ---
    let currentAngle = -90 - (radioAngularWidth / 2);
    for (let i = 0; i < 6; i++) {
        const tramo = anilloManual[i];
        drawArc(currentAngle, currentAngle + radioAngularWidth, tramo[0]);
        currentAngle += radioAngularWidth;
        for (let j = 0; j < 6; j++) {
            drawArc(currentAngle, currentAngle + interSlotAngularWidth, tramo[j+1]);
            currentAngle += interSlotAngularWidth;
        }
    }

    function drawArc(s, e, color) {
        const x1 = 50 + rOut * Math.cos(Math.PI * s / 180);
        const y1 = 50 + rOut * Math.sin(Math.PI * s / 180);
        const x2 = 50 + rOut * Math.cos(Math.PI * e / 180);
        const y2 = 50 + rOut * Math.sin(Math.PI * e / 180);
        const x3 = 50 + rIn * Math.cos(Math.PI * e / 180);
        const y3 = 50 + rIn * Math.sin(Math.PI * e / 180);
        const x4 = 50 + rIn * Math.cos(Math.PI * s / 180);
        const y4 = 50 + rIn * Math.sin(Math.PI * s / 180);
        const d = `M ${x1} ${y1} A ${rOut} ${rOut} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${rIn} ${rIn} 0 0 0 ${x4} ${y4} Z`;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d);
        path.setAttribute("class", `slot ${color}`);
        ringGroup.appendChild(path);
    }

    const slotHeight = (rIn - hexSize) / 5;
    configuracionRadiosManual.forEach((brazo, index) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("transform", `rotate(${index * 60} 50 50)`);
        brazo.forEach((color, j) => {
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("x", 50 - (radioWidth / 2));
            rect.setAttribute("y", (50 - rIn) + (j * slotHeight) + 0.2); 
            rect.setAttribute("width", radioWidth);
            rect.setAttribute("height", slotHeight);
            rect.setAttribute("class", `slot ${color}`);
            group.appendChild(rect);
        });
        spokesGroup.appendChild(group);
    });

    const hexPoints = [];
    for (let i = 0; i < 6; i++) {
        const x = 50 + hexSize * Math.cos(Math.PI * (i * 60) / 180);
        const y = 50 + hexSize * Math.sin(Math.PI * (i * 60) / 180);
        hexPoints.push(`${x},${y}`);
    }
    document.getElementById('hexCenter').setAttribute("points", hexPoints.join(" "));
</script>

</body>
</html>
